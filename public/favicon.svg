<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Magnifying glass circle -->
  <circle cx="14" cy="14" r="7" stroke="white" stroke-width="2.2" fill="none"/>
  <!-- Check inside lens -->
  <polyline points="10.5,14 13,16.5 17.5,11" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Lens handle -->
  <line x1="19.5" y1="19.5" x2="23" y2="23" stroke="white" stroke-width="2.4" stroke-linecap="round"/>
</svg>
